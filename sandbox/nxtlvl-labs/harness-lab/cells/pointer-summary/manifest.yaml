name: pointer-summary
type: skill
stage: graduated
intent: >
  When reporting on or summarizing multiple files, emit path:line pointers each with a one-line
  "why" instead of pasting file content blocks — the nxtlvl pointers-over-content house
  convention, as a focused, reusable skill.
intake:
  task: "Drafting multi-file summaries/reports that kept pasting large code blocks back into the conversation, which is expensive to read and rots as code changes."
  failed: "The convention is stated in many nxtlvl skills' prose but there is no single focused skill that encodes the pointer-first reporting behavior on its own."
graduation_criteria:
  - id: trigger-accuracy
    bar: ">= 0.9 on the declared trigger set (fires on multi-file report/summary asks, not on single-file edits)"
  - id: behavioral
    bar: "all behavioral eval cases pass — output is path:line pointers with one-line whys, never pasted blocks"
deps: []
target: plugins/nxtlvl/skills/pointer-summary
