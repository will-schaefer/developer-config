<svg width="100%" viewBox="0 0 680 572" role="img" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
<title>nxtlvl context-alert (Hook 1) process flow</title>
<desc>A PostToolUse hook fires after every tool call, runs fail-open guards, measures live context from the transcript, then does a two-stage check: crossing 200K fires an in-context FYI plus a macOS notification, crossing 325K fires a notification only, otherwise no-op. Dropping below 0.9x of a threshold re-arms both stages.</desc>
<style>
  svg { --arrow:#8c8c8c; }
  .t  { font-size:14px; fill:#1f1f1f; }
  .th { font-size:14px; font-weight:500; fill:#1f1f1f; }
  .ts { font-size:12px; fill:#5c5c5c; }
  .box { fill:#f4f4f2; stroke:#d8d8d4; stroke-width:1.5; }
  .arr { stroke:var(--arrow); stroke-width:1.5; fill:none; }
  .loop { stroke:var(--arrow); stroke-width:1.3; fill:none; stroke-dasharray:4 4; }
  .c-blue  rect { fill:#e6f1fb; stroke:#3b82c4; stroke-width:1.5; }
  .c-blue  .th { fill:#0c447c; } .c-blue .ts { fill:#1565b0; }
  .c-amber rect { fill:#fbefdd; stroke:#c5811f; stroke-width:1.5; }
  .c-amber .th { fill:#6e430c; } .c-amber .ts { fill:#9a6212; }
  .c-gray  rect { fill:#ececea; stroke:#8a8a8a; stroke-width:1.5; }
  .c-gray  .th { fill:#333333; } .c-gray .ts { fill:#555555; }
  #arrow path { stroke:var(--arrow); }
  @media (prefers-color-scheme: dark) {
    svg { --arrow:#8a8a8a; }
    .t, .th { fill:#e6e6e6; } .ts { fill:#b0b0b0; }
    .box { fill:#2a2a2a; stroke:#454545; }
    .c-blue  rect { fill:#0c447c; stroke:#5fa0e0; } .c-blue .th { fill:#dcebfb; } .c-blue .ts { fill:#bcd9f5; }
    .c-amber rect { fill:#6e430c; stroke:#e0a45f; } .c-amber .th { fill:#fbeedc; } .c-amber .ts { fill:#f0d6ae; }
    .c-gray  rect { fill:#333333; stroke:#777777; } .c-gray .th { fill:#eeeeee; } .c-gray .ts { fill:#cccccc; }
  }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke-width="1.5"/>
</marker>
</defs>

<!-- Trigger -->
<rect class="box" x="190" y="48" width="300" height="44" rx="8"/>
<text class="th" x="340" y="68" text-anchor="middle">PostToolUse · every tool call</text>
<text class="ts" x="340" y="84" text-anchor="middle">event JSON on stdin · 10s timeout</text>
<line class="arr" x1="340" y1="92" x2="340" y2="118" marker-end="url(#arrow)"/>

<!-- Guards -->
<rect class="box" x="170" y="120" width="340" height="44" rx="8"/>
<text class="th" x="340" y="140" text-anchor="middle">Guards · fail-open</text>
<text class="ts" x="340" y="156" text-anchor="middle">disabled / no session / no context → exit 0</text>
<line class="arr" x1="340" y1="164" x2="340" y2="190" marker-end="url(#arrow)"/>

<!-- Measure -->
<rect class="box" x="190" y="192" width="300" height="44" rx="8"/>
<text class="th" x="340" y="212" text-anchor="middle">Measure live context</text>
<text class="ts" x="340" y="228" text-anchor="middle">Σ input + cache tokens · last main turn</text>
<line class="arr" x1="340" y1="236" x2="340" y2="262" marker-end="url(#arrow)"/>

<!-- Decide -->
<rect class="box" x="170" y="264" width="340" height="48" rx="8"/>
<text class="th" x="340" y="286" text-anchor="middle">Two-stage check + session state</text>
<text class="ts" x="340" y="304" text-anchor="middle">armed? · crossed a threshold?</text>

<!-- Fan-out arrows -->
<line class="arr" x1="340" y1="312" x2="146" y2="374" marker-end="url(#arrow)"/>
<line class="arr" x1="340" y1="312" x2="340" y2="374" marker-end="url(#arrow)"/>
<line class="arr" x1="340" y1="312" x2="534" y2="374" marker-end="url(#arrow)"/>
<text class="ts" x="206" y="340" text-anchor="middle">crossed 200K</text>
<text class="ts" x="352" y="348" text-anchor="start">crossed 325K</text>
<text class="ts" x="488" y="336" text-anchor="middle">no new crossing</text>

<!-- Outcome: Primary -->
<g class="c-blue">
<rect x="40" y="378" width="200" height="72" rx="8"/>
<text class="th" x="140" y="402" text-anchor="middle">Primary ≥ 200K</text>
<text class="ts" x="140" y="422" text-anchor="middle">FYI line · don't stop</text>
<text class="ts" x="140" y="440" text-anchor="middle">+ macOS notify</text>
</g>

<!-- Outcome: Backstop -->
<g class="c-amber">
<rect x="260" y="378" width="160" height="72" rx="8"/>
<text class="th" x="340" y="408" text-anchor="middle">Backstop ≥ 325K</text>
<text class="ts" x="340" y="430" text-anchor="middle">macOS notify only</text>
</g>

<!-- Outcome: No-op -->
<g class="c-gray">
<rect x="440" y="378" width="200" height="72" rx="8"/>
<text class="th" x="540" y="408" text-anchor="middle">Below / already fired</text>
<text class="ts" x="540" y="430" text-anchor="middle">nothing emitted</text>
</g>

<!-- Re-arm loop -->
<path class="loop" d="M110 502 H55 V288 H168" marker-end="url(#arrow)"/>
<text class="ts" x="92" y="398" text-anchor="middle">re-arms</text>
<rect class="box" x="110" y="480" width="460" height="44" rx="8"/>
<text class="th" x="340" y="500" text-anchor="middle">Re-arm · hysteresis</text>
<text class="ts" x="340" y="516" text-anchor="middle">drops below 0.9× → both stages reset (e.g. /compact)</text>

<!-- Legend -->
<g class="c-blue"><rect x="150" y="540" width="12" height="12" rx="2"/></g>
<text class="ts" x="168" y="550" text-anchor="start">primary fires</text>
<g class="c-amber"><rect x="300" y="540" width="12" height="12" rx="2"/></g>
<text class="ts" x="318" y="550" text-anchor="start">backstop fires</text>
<g class="c-gray"><rect x="470" y="540" width="12" height="12" rx="2"/></g>
<text class="ts" x="488" y="550" text-anchor="start">no-op</text>
</svg>
